[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --ignore=test_document_selection.py --ignore=test_full_request.py --ignore=test_image_prompt.py --ignore=test_openrouter_prompt.py
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
cache_dir = tests/.pytest_cache
